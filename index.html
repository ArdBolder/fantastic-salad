<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="accordion" aria-label="CSS аккордеон">
      <h1 class="accordion__heading">Салат "Металург"</h1>

      <div class="item">
        <input class="item__control" type="radio" name="accordion" id="item1" checked>
        <label class="item__label" for="item1">
          <span class="item__top">
            <span class="item__text">3 столовые ложки</span>
            <span class="item__icon" aria-hidden="true">+</span>
          </span>
          <span class="item__content">
            <img class="item__image" src="img/bs.png" alt="">
          </span>
        </label>
      </div>

      <div class="item">
        <input class="item__control" type="radio" name="accordion" id="item2">
        <label class="item__label" for="item2">
          <span class="item__top">
            <span class="item__text">4 чайные ложки</span>
            <span class="item__icon" aria-hidden="true">+</span>
          </span>
          <span class="item__content">
            <img class="item__image" src="img/ss.png" alt="">
          </span>
        </label>
      </div>

      <div class="item">
        <input class="item__control" type="radio" name="accordion" id="item3">
        <label class="item__label" for="item3">
          <span class="item__top">
            <span class="item__text">Салат в высокой миске</span>
            <span class="item__icon" aria-hidden="true">+</span>
          </span>
          <span class="item__content">
            <img class="item__image" src="img/calat.jpg" alt="">
            <span class="item__note">*на изображении приготовленно больше 1 порции) </span>
          </span>
        </label>
      </div>
    </section>
  </main>
</body>
